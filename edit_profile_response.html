    <style>
      :root {
        --body-bg: #f8f9fa;
        --card-bg: #ffffff;
        --text-color: #212529;
        --border-color: #dee2e6;
        --nav-bg: #f8f9fa;
        --nav-color: #212529;
        --chat-bg: #ffffff;
        --chat-list-hover: #f8f9fa;
        --chat-list-active: #e9ecef;
        --message-bubble-bg: #f1f1f1;
        --message-bubble-own: #d1e7dd;
        --transition-speed: 0.3s;
      }

      [data-bs-theme="dark"] {
        --body-bg: #212529;
        --card-bg: #343a40;
        --text-color: #f8f9fa;
        --border-color: #495057;
        --nav-bg: #343a40;
        --nav-color: #f8f9fa;
        --chat-bg: #2b3035;
        --chat-list-hover: #343a40;
        --chat-list-active: #495057;
        --message-bubble-bg: #343a40;
        --message-bubble-own: #0d6efd20;
      }

      body {
        background-color: var(--body-bg);
        color: var(--text-color);
        transition: background-color var(--transition-speed) ease, 
                    color var(--transition-speed) ease;
      }

      .navbar {
        background-color: var(--nav-bg) !important;
        transition: background-color var(--transition-speed) ease;
      }

      .navbar-light .navbar-brand,
      .navbar-light .navbar-nav .nav-link {
        color: var(--nav-color);
        transition: color var(--transition-speed) ease;
      }

      .card, .list-group-item {
        background-color: var(--card-bg);
        color: var(--text-color);
        border-color: var(--border-color);
        transition: background-color var(--transition-speed) ease, 
                    color var(--transition-speed) ease, 
                    border-color var(--transition-speed) ease;
      }
      
      .border {
        border-color: var(--border-color) !important;
        transition: border-color var(--transition-speed) ease;
      }
      
      .dropdown-menu {
        background-color: var(--card-bg);
        border-color: var(--border-color);
        transition: background-color var(--transition-speed) ease, 
                    border-color var(--transition-speed) ease;
      }
      
      .dropdown-item {
        color: var(--text-color);
        transition: color var(--transition-speed) ease, 
                    background-color var(--transition-speed) ease;
      }
      
      .dropdown-item:hover {
        background-color: var(--chat-list-hover);
      }
      
      .chat-list-container {
        background-color: var(--card-bg);
        transition: background-color var(--transition-speed) ease;
      }
      
      .chat-list .list-group-item {
        background-color: var(--card-bg);
        color: var(--text-color);
        border-color: var(--border-color);
        transition: background-color var(--transition-speed) ease, 
                    color var(--transition-speed) ease,
                    border-color var(--transition-speed) ease;
      }
      
      .chat-list .list-group-item:hover {
        background-color: var(--chat-list-hover);
      }
      
      .chat-list .list-group-item.active {
        background-color: var(--chat-list-active);
        color: var(--text-color);
        border-color: var(--border-color);
      }
      
      #chatContent, .border.rounded {
        background-color: var(--chat-bg) !important;
        transition: background-color var(--transition-speed) ease;
      }
      
      /* Theme switch button */
      #themeToggle {
        cursor: pointer;
        padding: 5px 10px;
        border-radius: 20px;
        display: inline-flex;
        align-items: center;
        font-size: 1.2rem;
        transition: all 0.3s ease;
      }
      
      [data-bs-theme="light"] .theme-icon-dark {
        display: none;
      }
      
      [data-bs-theme="dark"] .theme-icon-light {
        display: none;
      }

      /* Page transition animations */
      .page-transition-container {
        position: relative;
        min-height: 100vh;
      }

      .page-content {
        animation: fadeIn 0.4s ease-in-out;
      }

      @keyframes fadeIn {
        0% {
          opacity: 0;
          transform: translateY(10px);
        }
        100% {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* Theme toggle animation */
      .theme-toggle-switch {
        position: relative;
        display: inline-block;
        width: 60px;
        height: 30px;
        margin: 0;
      }

      .theme-toggle-switch input {
        opacity: 0;
        width: 0;
        height: 0;
      }

      .theme-toggle-slider {
        position: absolute;
        cursor: pointer;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background-color: #ccc;
        transition: .4s;
        border-radius: 30px;
      }

      .theme-toggle-slider:before {
        position: absolute;
        content: "";
        height: 22px;
        width: 22px;
        left: 4px;
        bottom: 4px;
        background-color: white;
        transition: .4s;
        border-radius: 50%;
      }

      input:checked + .theme-toggle-slider {
        background-color: #2196F3;
      }

      input:checked + .theme-toggle-slider:before {
        transform: translateX(30px);
      }

      .theme-icon-light, .theme-icon-dark {
        position: absolute;
        top: 6px;
        font-size: 0.85rem;
        transition: opacity 0.3s ease;
      }

      .theme-icon-light {
        left: 8px;
        color: #f1c40f;
      }

      .theme-icon-dark {
        right: 8px;
        color: #f8f9fa;
      }
    </style>

    <script>
      // Theme toggle functionality
      document.addEventListener('DOMContentLoaded', function() {
        const htmlElement = document.documentElement;
        const themeToggleInput = document.getElementById('themeToggleInput');
        
        // Check for saved theme preference or use preferred color scheme
        const savedTheme = getCookie('theme');
        if (savedTheme) {
          htmlElement.setAttribute('data-bs-theme', savedTheme);
          themeToggleInput.checked = savedTheme === 'dark';
        } else {
          // Check for OS preference
          const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          if (prefersDark) {
            htmlElement.setAttribute('data-bs-theme', 'dark');
            themeToggleInput.checked = true;
            setCookie('theme', 'dark', 365);
          }
        }
        
        // Toggle theme when button is clicked
        themeToggleInput.addEventListener('change', function() {
          const newTheme = this.checked ? 'dark' : 'light';
          
          // Animate theme change
          document.body.style.transition = 'background-color 0.5s ease, color 0.5s ease';
          htmlElement.setAttribute('data-bs-theme', newTheme);
          setCookie('theme', newTheme, 365);
        });
        
        // Cookie functions
        function setCookie(name, value, days) {
          const date = new Date();
          date.setTime(date.getTime() + (days * 24 * 60 * 60 * 1000));
          const expires = "expires=" + date.toUTCString();
          document.cookie = name + "=" + value + ";" + expires + ";path=/";
        }
        
        function getCookie(name) {
          const nameEQ = name + "=";
          const ca = document.cookie.split(';');
          for(let i = 0; i < ca.length; i++) {
            let c = ca[i];
            while (c.charAt(0) === ' ') c = c.substring(1, c.length);
            if (c.indexOf(nameEQ) === 0) return c.substring(nameEQ.length, c.length);
          }
          return null;
        }

        // Page transition for all links
        setupPageTransitions();
      });

      // Setup smooth transitions between pages
      function setupPageTransitions() {
        const contentContainer = document.querySelector('.container.mt-4');
        
        // Add page-content class for initial animation
        contentContainer.classList.add('page-content');
        
        // Add transition effect to internal links
        document.querySelectorAll('a').forEach(link => {
          // Skip links that open in new windows or are anchors
          if (link.target === '_blank' || link.getAttribute('href')?.startsWith('#') || 
              link.getAttribute('href')?.startsWith('javascript:') || 
              link.getAttribute('href')?.startsWith('mailto:')) {
            return;
          }
          
          // Only apply to internal links
          if (link.host === window.location.host) {
            link.addEventListener('click', function(e) {
              // Skip if modified click (ctrl, shift, etc)
              if (e.ctrlKey || e.shiftKey || e.metaKey || e.button !== 0) {
                return;
              }
              
              e.preventDefault();
              const targetUrl = link.href;
              
              // Animate out
              contentContainer.style.opacity = '0';
              contentContainer.style.transform = 'translateY(10px)';
              contentContainer.style.transition = 'opacity 0.3s ease, transform 0.3s ease';
              
              // Navigate after animation completes
              setTimeout(() => {
                window.location.href = targetUrl;
              }, 300);
            });
          }
        });
      }
    </script>
    
<script>
  function previewAvatar(event) {
    const input = event.target;
    if (input.files && input.files[0]) {
      const reader = new FileReader();
      
      reader.onload = function(e) {
        document.getElementById('avatar-preview').src = e.target.result;
      };
      
      reader.readAsDataURL(input.files[0]);
    }
  }
</script>
